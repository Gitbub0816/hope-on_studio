<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion Demo — dev only, not shipped</title>
  </head>
  <body data-ground="ink">
    <div id="app">
      <section class="demo-section demo-hero" data-ground="ink">
        <p class="kicker">HOPE ON STUDIO — MOTION PREVIEW</p>
        <h1>Hope&nbsp;On<br />Studio</h1>
        <div class="rule"></div>
        <canvas class="demo-canvas" width="480" height="220"></canvas>
      </section>

      <section class="demo-section demo-manifesto" data-ground="cream">
        <p class="kicker">MANIFESTO</p>
        <h2 class="ghost-target">About Us</h2>
        <div class="rule"></div>
        <p class="scatter-line">
          Every quiet page every held frame every lesson learned begins the same way with attention
        </p>
      </section>

      <section class="demo-section demo-triptych" data-ground="ink">
        <p class="kicker">THREE OUTLETS</p>
        <div class="triptych-row">
          <button class="magnetic-btn" data-cursor="link">Publishing</button>
          <button class="magnetic-btn" data-cursor="link" data-cursor-badge="EXPLORE">Photography</button>
          <button class="magnetic-btn" data-cursor="link">Learning Design</button>
        </div>
      </section>

      <section class="demo-section demo-gallery" data-ground="cream">
        <p class="kicker">GALLERY FLOW</p>
        <div class="gallery-row">
          <div class="gallery-card" data-depth="-1" data-rotate="-3">A</div>
          <div class="gallery-card" data-depth="0.2" data-rotate="2">B</div>
          <div class="gallery-card" data-depth="0.7" data-rotate="-4">C</div>
          <div class="gallery-card" data-depth="1" data-rotate="3">D</div>
        </div>
      </section>

      <section class="demo-section demo-marquee" data-ground="ink">
        <div class="marquee-el">
          <span>LATEST AND UPDATES&nbsp;&nbsp;&nbsp;•&nbsp;&nbsp;&nbsp;</span>
        </div>
      </section>

      <section class="demo-section demo-footer" data-ground="cream">
        <p class="kicker">HOPE ON STUDIO — EST. 2026</p>
        <p class="whisper">a gift, quietly made.</p>
      </section>
    </div>

    <script type="module" src="/src/motion/demo.ts"></script>
  </body>
</html>
